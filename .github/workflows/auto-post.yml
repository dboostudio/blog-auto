name: 자동 포스팅

on:
  schedule:
    # 매일 오전 9시 (KST = UTC+9, 즉 UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: '생성할 포스트 수'
        default: '3'

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 의존성 설치
        run: npm ci

      - name: 뉴스 수집 + 포스트 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs ${{ github.event.inputs.count || '3' }}

      - name: 제휴 링크 삽입
        env:
          COUPANG_PARTNERS_ID: ${{ secrets.COUPANG_PARTNERS_ID }}
        run: node scripts/inject-affiliate.mjs

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "blog-auto-bot"
          git config user.email "bot@blog-auto"
          git add posts/
          git diff --staged --quiet || git commit -m "auto: $(date '+%Y-%m-%d') 포스트 추가"
          git push
